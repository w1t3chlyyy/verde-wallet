<body>

<div class="mesh-bg">
  <div class="mesh-orb"></div>
  <div class="mesh-orb"></div>
  <div class="mesh-orb"></div>
</div>

<div class="app">

  <header class="page-header entrance">
    <a href="discover.html" class="page-header-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1 class="page-header-title">NFT Маркетплейс</h1>
  </header>

  <div class="market-tabs entrance entrance-d1">
    <button class="market-tab active" onclick="filterNft(this,'all')">Все</button>
    <button class="market-tab" onclick="filterNft(this,'art')">Арт</button>
    <button class="market-tab" onclick="filterNft(this,'collectibles')">Коллекции</button>
    <button class="market-tab" onclick="filterNft(this,'gaming')">Игры</button>
  </div>

  <div class="nft-grid">
    <div class="nft-card reveal" onclick="showNftDetail('Verde Genesis #0421')">
      <div class="nft-card-img">🎨</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Verde Genesis #0421</div>
        <div class="nft-card-price">2.5 SOL</div>
      </div>
    </div>
    <div class="nft-card reveal" onclick="showNftDetail('Green Leaf #0892')">
      <div class="nft-card-img" style="background:linear-gradient(135deg,#9945FF,#14F195);">🌿</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Green Leaf #0892</div>
        <div class="nft-card-price">1.8 SOL</div>
      </div>
    </div>
    <div class="nft-card reveal" onclick="showNftDetail('Crypto Punk #1204')">
      <div class="nft-card-img" style="background:linear-gradient(135deg,#F7931A,#E67E00);">🔥</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Crypto Punk #1204</div>
        <div class="nft-card-price">45 ETH</div>
      </div>
    </div>
    <div class="nft-card reveal" onclick="showNftDetail('Diamond Hand #2567')">
      <div class="nft-card-img" style="background:linear-gradient(135deg,#627EEA,#4C63D2);">💎</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Diamond Hand #2567</div>
        <div class="nft-card-price">12.5 ETH</div>
      </div>
    </div>
    <div class="nft-card reveal" onclick="showNftDetail('Cyber Ape #3312')">
      <div class="nft-card-img" style="background:linear-gradient(135deg,#EC4899,#F472B6);">🐵</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Cyber Ape #3312</div>
        <div class="nft-card-price">8.2 SOL</div>
      </div>
    </div>
    <div class="nft-card reveal" onclick="showNftDetail('Pixel Warrior #4456')">
      <div class="nft-card-img" style="background:linear-gradient(135deg,#3B82F6,#60A5FA);">⚔️</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Pixel Warrior #4456</div>
        <div class="nft-card-price">3.1 SOL</div>
      </div>
    </div>
    <div class="nft-card reveal" onclick="showNftDetail('Meta Land #5678')">
      <div class="nft-card-img" style="background:linear-gradient(135deg,#8B5CF6,#A78BFA);">🏝️</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Meta Land #5678</div>
        <div class="nft-card-price">25 ETH</div>
      </div>
    </div>
    <div class="nft-card reveal" onclick="showNftDetail('Space Cat #6789')">
      <div class="nft-card-img" style="background:linear-gradient(135deg,#10B981,#34D399);">🐱</div>
      <div class="nft-card-info">
        <div class="nft-card-name">Space Cat #6789</div>
        <div class="nft-card-price">1.2 SOL</div>
      </div>
    </div>
  </div>

  <div class="nav-spacer"></div>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item" data-tab="wallet">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
    </div>
    <span>Кошелёк</span>
  </a>
  <a href="market.html" class="nav-item" data-tab="market">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
    </div>
    <span>Рынок</span>
  </a>
  <a href="swap.html" class="nav-item" data-tab="swap">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10h14l-4-4"/><path d="M17 14H3l4 4"/></svg>
    </div>
    <span>Обмен</span>
  </a>
  <a href="discover.html" class="nav-item active" data-tab="discover">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    </div>
    <span>Обзор</span>
  </a>
  <a href="profile.html" class="nav-item" data-tab="profile">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <span>Профиль</span>
  </a>
</nav>

<script>
function filterNft(btn, filter) {
  document.querySelectorAll('.market-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showToast('Фильтр: ' + filter);
}
function showNftDetail(name) {
  showToast('NFT: ' + name + '\nОткрывается карточка...');
}
function showToast(message) {
  const container = document.createElement('div');
  container.className = 'toast-custom';
  container.textContent = message;
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 2200);
}
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
</script>
</body>
</html>
