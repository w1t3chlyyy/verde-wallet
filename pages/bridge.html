<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F7F9F4">
<title>Мост — Verde Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="mesh-bg">
  <div class="mesh-orb"></div>
  <div class="mesh-orb"></div>
  <div class="mesh-orb"></div>
</div>

<div class="app">

  <header class="page-header entrance">
    <a href="../index.html" class="page-header-back">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1 class="page-header-title">Мост</h1>
  </header>

  <div class="swap-card entrance entrance-d1">
    <div class="swap-input-group">
      <label>Из сети</label>
      <div class="swap-input-wrap" style="cursor:pointer;" onclick="selectNetwork('from')">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="asset-icon asset-icon-eth" style="width:32px;height:32px;font-size:14px;">Ξ</div>
          <span style="font-weight:600;">Ethereum</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="swap-divider">
      <button class="swap-divider-btn" onclick="reverseBridge()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10h14l-4-4"/><path d="M17 14H3l4 4"/></svg>
      </button>
    </div>

    <div class="swap-input-group">
      <label>В сеть</label>
      <div class="swap-input-wrap" style="cursor:pointer;" onclick="selectNetwork('to')">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="asset-icon asset-icon-sol" style="width:32px;height:32px;font-size:14px;">S</div>
          <span style="font-weight:600;">Solana</span>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>

    <div class="swap-input-group">
      <label>Сумма</label>
      <div class="swap-input-wrap">
        <input type="number" placeholder="0.0" id="bridgeAmount">
        <div class="swap-token-select">
          <div class="asset-icon asset-icon-usdt" style="width:28px;height:28px;font-size:12px;">$</div>
          <span>USDT</span>
        </div>
      </div>
    </div>

    <div class="swap-rate">
      <span>Время перевода</span>
      <span class="swap-rate-value">~5-15 мин</span>
    </div>
    <div class="swap-rate">
      <span>Комиссия моста</span>
      <span class="swap-rate-value">~$2.50</span>
    </div>
    <div class="swap-rate">
      <span>Получите</span>
      <span class="swap-rate-value" id="bridgeReceive">0 USDT</span>
    </div>

    <button class="sheet-btn" style="margin-top:8px;" onclick="executeBridge()">Перевести</button>
  </div>

  <div class="section-header" style="padding-top:8px;">
    <h2 class="section-title">Поддерживаемые сети</h2>
  </div>
  <div style="padding:0 20px 20px;display:flex;flex-direction:column;gap:8px;">
    <div class="asset-item">
      <div class="asset-icon asset-icon-eth" style="width:40px;height:40px;font-size:16px;">Ξ</div>
      <div class="asset-info">
        <div class="asset-name">Ethereum</div>
        <div class="asset-balance">Основная сеть</div>
      </div>
    </div>
    <div class="asset-item">
      <div class="asset-icon asset-icon-sol" style="width:40px;height:40px;font-size:16px;">S</div>
      <div class="asset-info">
        <div class="asset-name">Solana</div>
        <div class="asset-balance">Быстрый и дешёвый</div>
      </div>
    </div>
    <div class="asset-item">
      <div class="asset-icon asset-icon-ton" style="width:40px;height:40px;font-size:16px;">T</div>
      <div class="asset-info">
        <div class="asset-name">TON</div>
        <div class="asset-balance">Интеграция с Telegram</div>
      </div>
    </div>
    <div class="asset-item">
      <div class="asset-icon" style="width:40px;height:40px;font-size:16px;background:linear-gradient(135deg,#8247E5,#A855F7);color:#fff;">P</div>
      <div class="asset-info">
        <div class="asset-name">Polygon</div>
        <div class="asset-balance">L2 для Ethereum</div>
      </div>
    </div>
  </div>

  <div class="nav-spacer"></div>
</div>

<nav class="bottom-nav">
  <a href="../index.html" class="nav-item" data-tab="wallet">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
    </div>
    <span>Кошелёк</span>
  </a>
  <a href="market.html" class="nav-item" data-tab="market">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
    </div>
    <span>Рынок</span>
  </a>
  <a href="swap.html" class="nav-item" data-tab="swap">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10h14l-4-4"/><path d="M17 14H3l4 4"/></svg>
    </div>
    <span>Обмен</span>
  </a>
  <a href="discover.html" class="nav-item" data-tab="discover">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    </div>
    <span>Обзор</span>
  </a>
  <a href="profile.html" class="nav-item" data-tab="profile">
    <div class="nav-item-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <span>Профиль</span>
  </a>
</nav>

<script>
function selectNetwork(side) {
  showToast('Выбор сети: ' + side);
}
function reverseBridge() {
  showToast('Сети поменяны местами');
}
function executeBridge() {
  const btn = document.querySelector('.sheet-btn');
  if (!btn) return;
  btn.textContent = '✓ Успешно';
  btn.style.background = 'var(--green-500)';
  setTimeout(() => {
    btn.textContent = 'Перевести';
    btn.style.background = '';
    document.getElementById('bridgeAmount').value = '';
  }, 1500);
}
function showToast(message) {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#16A34A;color:#fff;padding:14px 28px;border-radius:16px;font-weight:600;font-size:14px;z-index:400;animation:fadeInOut 2.2s ease forwards;font-family:Inter;';
  container.textContent = message;
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 2200);
}
</script>
</body>
</html>
